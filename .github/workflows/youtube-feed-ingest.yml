name: YouTube Feed Ingest

on:
  schedule:
    - cron: "7 6,18 * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    env:
      CHRYSALIS_API_BASE_URL: ${{ secrets.CHRYSALIS_API_BASE_URL }}
      FEED_INGEST_SECRET: ${{ secrets.FEED_INGEST_SECRET }}

    steps:
      - name: Validate required secrets
        run: |
          test -n "$CHRYSALIS_API_BASE_URL"
          test -n "$FEED_INGEST_SECRET"

      - name: Call YouTube ingest endpoint
        run: |
          curl -X POST "$CHRYSALIS_API_BASE_URL/api/admin/ingest/youtube" \
            -H "X-Feed-Ingest-Secret: $FEED_INGEST_SECRET" \
            --fail \
            --show-error